services:
  postgres:
    image: postgres:16-alpine
    container_name: hms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hms
      POSTGRES_USER: hms_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./pg-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms_user -d hms"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"

  hms-api:
    build:
      context: ./hms
      dockerfile: Dockerfile
    image: hms-api:latest
    container_name: hms-api
    restart: unless-stopped
    env_file:
      - ./hms.env
    expose:
      - "3000"
    volumes:
      - hms_uploads:/data/uploads
      - ./secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2
    container_name: hms-caddy
    restart: unless-stopped
    env_file:
      - ./hms.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./conf.d:/etc/caddy/conf.d:ro
      - ./hms/dist:/srv/hms-web:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - hms-api

volumes:
  pg_data:
  caddy_data:
  caddy_config:
  hms_uploads:
